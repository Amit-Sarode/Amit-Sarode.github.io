<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Page Not Found | Amit Sarode</title>
  <meta name="description" content="The page you're looking for doesn't exist. Let's get you back on track." />
  <meta name="robots" content="noindex, follow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #020d0a 0%, #050f10 40%, #02100d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f1f5f9;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 40px 24px;
      text-align: center;
    }
    .error-code {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid rgba(20,184,166,0.2);
      background: rgba(20,184,166,0.06);
      margin-bottom: 20px;
      font-size: 13px;
      color: #14b8a6;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #14b8a6;
      display: inline-block;
    }
    h1 {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(120deg, #ffffff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    p {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .btn-primary, .btn-secondary {
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #14b8a6, #0d9488);
      color: #fff;
      border: none;
      box-shadow: 0 4px 14px rgba(20,184,166,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(20,184,166,0.4);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(20,184,166,0.3);
      color: #14b8a6;
    }
    .btn-secondary:hover {
      transform: translateY(-2px);
      border-color: rgba(20,184,166,0.6);
    }
    /* Animation */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.3); }
    }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
    .pulse-dot-2 { animation: pulse-dot 2s ease-in-out infinite 0.5s; }
    .pulse-dot-3 { animation: pulse-dot 2s ease-in-out infinite 1s; }
  </style>
</head>
<body>
  <div class="container">
    <svg width="200" height="160" viewBox="0 0 200 160" fill="none" style="display:block;margin:0 auto 24px">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.3" />
          <stop offset="100%" stop-color="#14b8a6" stop-opacity="0" />
        </linearGradient>
      </defs>
      <rect x="60" y="30" width="80" height="100" rx="8" stroke="#14b8a6" stroke-width="1.5" fill="url(#g)" />
      <line x1="78" y1="52" x2="122" y2="52" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />
      <line x1="78" y1="64" x2="110" y2="64" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />
      <line x1="78" y1="76" x2="118" y2="76" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />
      <line x1="78" y1="88" x2="105" y2="88" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />
      <text x="100" y="115" text-anchor="middle" fill="#5eead4" font-size="22" font-weight="700" font-family="monospace">?</text>
      <g class="float-anim" transform-origin="140 130">
        <circle cx="110" cy="100" r="22" stroke="#5eead4" stroke-width="2.5" fill="none" opacity="0.6" />
        <line x1="127" y1="117" x2="140" y2="130" stroke="#5eead4" stroke-width="2.5" stroke-linecap="round" opacity="0.6" />
      </g>
      <circle cx="40" cy="45" r="3" fill="#14b8a6" opacity="0.4" class="pulse-dot" />
      <circle cx="160" cy="55" r="2.5" fill="#5eead4" opacity="0.3" class="pulse-dot-2" />
      <circle cx="155" cy="120" r="2" fill="#14b8a6" opacity="0.25" class="pulse-dot-3" />
    </svg>

    <div class="error-code"><span class="dot"></span> ERROR 404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div class="actions">
      <a href="/" class="btn-primary">← Back Home</a>
      <a href="javascript:history.back()" class="btn-secondary">Go Back</a>
    </div>
  </div>

  <script>
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
      '/?/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
        .replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') + l.hash
    );
  </script>
</body>
</html>
